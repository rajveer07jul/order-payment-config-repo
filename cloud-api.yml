server:
  port: 8086

spring:
  application:
    name: cloud-api

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

app:
  message: Hello from GitHub Config Repository
  owner: Rajveer
